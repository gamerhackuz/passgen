<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parol Generatori</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #2c3e50, #4ca1af);
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 24px;
            padding: 35px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 25px; }
        .output {
            background: #f4f6f8;
            padding: 15px;
            border-radius: 12px;
            font-size: 22px;
            font-family: monospace;
            text-align: center;
            letter-spacing: 2px;
            margin-bottom: 20px;
            position: relative;
            color: #333;
            min-height: 55px;
            display: flex;
            align-items: center;
            justify-content: center;
            word-break: break-all;
        }
        .copy-btn {
            position: absolute;
            right: 10px;
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            opacity: 0.5;
            transition: 0.2s;
        }
        .copy-btn:hover { opacity: 1; }
        .controls { display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; }
        .control { display: flex; justify-content: space-between; align-items: center; }
        input[type="range"] { flex: 1; margin: 0 15px; accent-color: #4ca1af; }
        .checkboxes { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .checkboxes label { display: flex; align-items: center; gap: 8px; font-size: 14px; cursor: pointer; }
        .generate {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #4ca1af, #2c3e50);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
        }
        .generate:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(76, 161, 175, 0.4); }
        .strength { height: 6px; background: #eee; border-radius: 3px; margin-top: 15px; overflow: hidden; }
        .strength-bar { height: 100%; width: 0%; transition: 0.3s; border-radius: 3px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🔐 Parol Generatori</h2>
        <div class="output">
            <span id="password">Parol shu yerda</span>
            <button class="copy-btn" onclick="copyPassword()">📋</button>
        </div>
        <div class="strength"><div class="strength-bar" id="strengthBar"></div></div>

        <div class="controls">
            <div class="control">
                <span>Uzunlik:</span>
                <input type="range" id="length" min="6" max="32" value="12">
                <span id="lengthVal">12</span>
            </div>
            <div class="checkboxes">
                <label><input type="checkbox" id="upper" checked> Katta harf</label>
                <label><input type="checkbox" id="lower" checked> Kichik harf</label>
                <label><input type="checkbox" id="numbers" checked> Raqamlar</label>
                <label><input type="checkbox" id="symbols" checked> Belgilar</label>
            </div>
        </div>
        <button class="generate" onclick="generate()">🔄 Yangi Parol Yaratish</button>
    </div>

    <script>
        const lengthEl = document.getElementById('length');
        const lengthVal = document.getElementById('lengthVal');
        lengthEl.addEventListener('input', () => lengthVal.textContent = lengthEl.value);

        function generate() {
            const len = parseInt(lengthEl.value);
            const upper = document.getElementById('upper').checked;
            const lower = document.getElementById('lower').checked;
            const numbers = document.getElementById('numbers').checked;
            const symbols = document.getElementById('symbols').checked;

            let chars = '';
            if (upper) chars += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            if (lower) chars += 'abcdefghijklmnopqrstuvwxyz';
            if (numbers) chars += '0123456789';
            if (symbols) chars += '!@#$%^&*()_+-=[]{}|;:,.<>?';

            if (!chars) { alert('Kamida bitta turini tanlang!'); return; }

            let pass = '';
            for (let i = 0; i < len; i++) pass += chars[Math.floor(Math.random() * chars.length)];

            document.getElementById('password').textContent = pass;
            updateStrength(len, upper, lower, numbers, symbols);
        }

        function updateStrength(len, ...checks) {
            const active = checks.filter(Boolean).length;
            let percent = (len / 32) * 50 + (active / 4) * 50;
            percent = Math.min(percent, 100);
            const bar = document.getElementById('strengthBar');
            bar.style.width = percent + '%';
            bar.style.background = percent < 40 ? '#ff4757' : percent < 70 ? '#ffa502' : '#2ecc71';
        }

        function copyPassword() {
            const text = document.getElementById('password').textContent;
            if (text === 'Parol shu yerda') return;
            navigator.clipboard.writeText(text);
            alert('Parol nusxalandi!');
        }

        generate();
    </script>
</body>
</html>
